<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Screening System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-primary text-white text-center">
            <h2>AI Resume Screening System</h2>
            <p class="mb-0">Upload resumes or paste text to compare with Job Description using AI</p>
        </div>

        <div class="card-body p-4">

            <form action="{{ url_for('analyze') }}" method="POST" enctype="multipart/form-data">

                <div class="mb-4">

                    <label class="form-label fw-bold">
                        Upload Resume(s) (PDF/DOCX) — Optional
                    </label>

                    <input
                        type="file"
                        name="resumes"
                        class="form-control"
                        multiple
                        accept=".pdf,.doc,.docx">

                </div>

                <div class="mb-4">

                    <label class="form-label fw-bold">
                        OR Paste Resume Text — Optional
                    </label>

                    <textarea
                        class="form-control"
                        name="resume_text"
                        rows="6"
                        placeholder="Paste resume text here if not uploading file..."></textarea>

                </div>

                <div class="mb-4">

                    <label class="form-label fw-bold">
                        Job Description
                    </label>

                    <textarea
                        class="form-control"
                        name="job_description"
                        rows="8"
                        placeholder="Paste the complete Job Description here..."
                        required></textarea>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">
                            Filter Skill (Optional)
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="filter_skill"
                            placeholder="Example: Python">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">
                            Minimum Match Score (Optional)
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="min_score"
                            min="0"
                            max="100"
                            placeholder="Example: 70">

                    </div>

                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">
                    Analyze Resume
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
